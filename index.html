<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>PASOVART | Müşteri Paneli</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap');

        :root {
            --bg:#f0f4f8; --card:#fff; --sb:#1e293b; --sb2:#0f172a;
            --acc:#3b82f6; --txt:#1e293b; --txt2:#475569; --txt3:#94a3b8;
            --bdr:#f1f5f9; --grn:#10b981; --red:#ef4444; --amb:#f59e0b;
            --sh:0 2px 14px rgba(0,0,0,.07);
            --fn:'DM Sans', system-ui, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--fn); background: var(--bg); color: var(--txt); overflow-x: hidden; }

        /* GİRİŞ EKRANI */
        .login-screen {
            position: fixed; inset: 0; background: linear-gradient(135deg, var(--sb), var(--sb2));
            z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .login-box {
            background: #fff; border-radius: 20px; padding: 40px; width: 100%; max-width: 380px;
            box-shadow: 0 30px 80px rgba(0,0,0,.3); text-align: center;
        }
        .login-logo-icon {
            width: 60px; height: 60px; border-radius: 16px; background: linear-gradient(135deg,#2563eb,#60a5fa);
            display: inline-flex; align-items: center; justify-content: center; margin-bottom: 15px;
        }
        .login-box h2 { font-weight: 800; letter-spacing: -1px; margin-bottom: 5px; }
        .login-box p { font-size: 13px; color: var(--txt3); margin-bottom: 25px; }
        .fg { text-align: left; margin-bottom: 15px; }
        .fg label { display: block; font-size: 12px; font-weight: 700; color: var(--txt2); margin-bottom: 5px; }
        .fg input {
            width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 10px;
            outline: none; font-family: var(--fn); transition: 0.2s; font-size: 16px; /* Mobilde zoom engelleme */
        }
        .fg input:focus { border-color: var(--acc); }
        .btn-p {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            background: var(--acc); color: #fff; font-weight: 700; cursor: pointer; font-size: 14px;
        }

        /* ANA EKRAN */
        .app { display: flex; min-height: 100vh; flex-direction: column; }
        .main { flex: 1; padding: 30px; width: 100%; max-width: 1000px; margin: 0 auto; }
        
        .hdr {
            background: #fff; padding: 20px 30px; border-bottom: 1px solid var(--bdr); border-radius: 16px;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;
            box-shadow: var(--sh);
        }
        .hdr h2 { font-size: 18px; font-weight: 800; }

        .card { background: var(--card); border-radius: 16px; padding: 25px; box-shadow: var(--sh); margin-bottom: 20px; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; }
        .stat-val { font-size: 24px; font-weight: 800; margin-top: 5px; }
        .stat-lbl { font-size: 11px; font-weight: 700; color: var(--txt3); text-transform: uppercase; }

        /* WORKFLOW */
        .workflow-box { margin-top: 20px; position: relative; padding: 20px 0 40px 0; }
        .progress-track {
            position: absolute; top: 35px; left: 5%; right: 5%; height: 6px;
            background: #e2e8f0; border-radius: 10px; z-index: 1;
        }
        .progress-fill {
            height: 100%; background: var(--grn); border-radius: 10px;
            width: 0%; transition: width 1s ease-in-out;
        }
        .steps { position: relative; z-index: 2; display: flex; justify-content: space-between; }
        .step-item { display: flex; flex-direction: column; align-items: center; width: 20%; }
        .step-dot {
            width: 34px; height: 34px; border-radius: 50%; background: #fff;
            border: 3px solid #e2e8f0; display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 12px; transition: 0.3s;
        }
        .step-item.active .step-dot { border-color: var(--grn); background: var(--grn); color: #fff; }
        .step-label {
            margin-top: 12px; font-size: 11px; font-weight: 700; text-align: center;
            color: var(--txt3); line-height: 1.3;
        }
        .step-item.active .step-label { color: var(--txt); }
        .status-msg {
            background: #f8fafc; padding: 15px; border-radius: 12px;
            text-align: center; font-size: 14px; font-weight: 500; color: var(--txt2);
        }

        /* TABLE */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 11px; color: var(--txt3); text-transform: uppercase; padding: 12px; border-bottom: 1px solid var(--bdr); }
        td { padding: 15px 12px; font-size: 14px; border-bottom: 1px solid #fafafa; vertical-align: middle; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; display: inline-block; }
        .b-wait { background: #fffbeb; color: var(--amb); }

        /* ─── RESPONSIVE / MOBİL UYUM ─── */
        @media (max-width: 768px) {
            .main { padding: 15px; }
            
            /* Header Mobil */
            .hdr {
                flex-direction: column; gap: 15px; text-align: center;
                padding: 20px; margin-bottom: 20px; align-items: stretch;
            }
            .hdr button { width: 100%; }

            /* Grid Mobil: Alt alta sırala */
            .stat-grid { grid-template-columns: 1fr; gap: 10px; margin-bottom: 15px; }
            .card { padding: 20px; margin-bottom: 15px; }

            /* Workflow Mobil */
            .step-dot { width: 28px; height: 28px; font-size: 11px; border-width: 2px; }
            .progress-track { top: 31px; }
            .step-label { font-size: 9px; margin-top: 8px; }
            
            /* Tablo -> Kart Görünümü (Responsive Table) */
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; } /* Başlıkları gizle */
            tr { 
                margin-bottom: 15px; border: 1px solid var(--bdr); 
                border-radius: 12px; padding: 10px; background: #fafafa;
            }
            td { 
                display: flex; justify-content: space-between; align-items: center; 
                padding: 10px 0; border-bottom: 1px solid #eee; text-align: right;
            }
            td:last-child { border-bottom: none; }
            /* data-label özelliği ile sol tarafa başlık ekleme */
            td::before {
                content: attr(data-label);
                font-weight: 700; color: var(--txt3); font-size: 11px; text-transform: uppercase;
                text-align: left; margin-right: 15px;
            }
        }

    </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <div class="login-logo-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </div>
        <h2>PASOVART</h2>
        <p>Giriş Bilgilerinizle Oturum Açın</p>
        
        <form onsubmit="handleCustomLogin(event)">
            <div class="fg">
                <label>Kullanıcı Adı</label>
                <input type="text" id="userInput" placeholder="örn: pasovart" required>
            </div>
            <div class="fg">
                <label>Şifre</label>
                <input type="password" id="passInput" placeholder="••••••" required>
            </div>
            <button type="submit" class="btn-p" id="loginBtn">Sisteme Giriş Yap</button>
        </form>

        <div id="loginError" style="color:var(--red); font-size:12px; margin-top:15px; display:none;"></div>
    </div>
</div>

<div class="app" id="mainApp" style="display:none">
    <main class="main">
        <header class="hdr">
            <h2 id="welcomeTxt">Hoş Geldiniz</h2>
            <button class="btn-p" style="width:auto; padding:8px 20px; background:var(--sb)" onclick="doLogout()">Çıkış Yap</button>
        </header>

        <div class="stat-grid">
            <div class="card">
                <div class="stat-lbl">Anlaşma Tutarı</div>
                <div class="stat-val" id="totalPrice">₺0</div>
            </div>
            <div class="card">
                <div class="stat-lbl">Ödenen</div>
                <div class="stat-val" style="color:var(--grn)" id="paidPrice">₺0</div>
            </div>
            <div class="card">
                <div class="stat-lbl">Kalan Borç</div>
                <div class="stat-val" style="color:var(--red)" id="debtPrice">₺0</div>
            </div>
        </div>

        <div class="card">
            <h3 style="font-size:16px; margin-bottom:20px;">🎬 İş Akış Süreciniz</h3>
            <div class="workflow-box">
                <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
                <div class="steps">
                    <div class="step-item" id="s1"><div class="step-dot">1</div><div class="step-label">Çekim</div></div>
                    <div class="step-item" id="s2"><div class="step-dot">2</div><div class="step-label">Yedekleme</div></div>
                    <div class="step-item" id="s3"><div class="step-dot">3</div><div class="step-label">Düzenleme</div></div>
                    <div class="step-item" id="s4"><div class="step-dot">4</div><div class="step-label">Baskı</div></div>
                    <div class="step-item" id="s5"><div class="step-dot">5</div><div class="step-label">Teslimat</div></div>
                </div>
            </div>
            <div class="status-msg" id="statusMsg">Durum bilgisi bekleniyor...</div>
        </div>

        <div class="card">
            <h3 style="font-size:16px; margin-bottom:15px;">📅 Çekim Detayları</h3>
            <table>
                <thead><tr><th>Tarih / Saat</th><th>Paket</th><th>Konum</th><th>Durum</th></tr></thead>
                <tbody id="sessionRow"></tbody>
            </table>
        </div>
    </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC82ZVx7sf6evT4zs3b5qoQ6H7eXTrf4Ng",
        authDomain: "pasovartpanel.firebaseapp.com",
        projectId: "pasovartpanel",
        storageBucket: "pasovartpanel.firebasestorage.app",
        messagingSenderId: "1031606727169",
        appId: "1:1031606727169:web:bde71345525d0ec7c90600",
        measurementId: "G-GTR6KPH1CL"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Oturum Kontrolü
    window.onload = function() {
        const savedDocId = localStorage.getItem('pasovart_client_id');
        if(savedDocId) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            fetchDataByDocId(savedDocId);
        }
    };

    // --- MANUEL GİRİŞ ---
    function handleCustomLogin(e) {
        e.preventDefault();
        
        const username = document.getElementById('userInput').value.trim();
        const pass = document.getElementById('passInput').value.trim();
        const btn = document.getElementById('loginBtn');
        const err = document.getElementById('loginError');

        btn.innerText = "Kontrol ediliyor...";
        btn.disabled = true;
        err.style.display = 'none';

        db.collection("clients")
          .where("username", "==", username)
          .get()
          .then((querySnapshot) => {
              if (querySnapshot.empty) {
                  throw new Error("Kullanıcı bulunamadı.");
              }

              let foundUser = null;
              let docId = null;

              querySnapshot.forEach((doc) => {
                  const data = doc.data();
                  if (data.password === pass) {
                      foundUser = data;
                      docId = doc.id;
                  }
              });

              if (foundUser) {
                  localStorage.setItem('pasovart_client_id', docId);
                  document.getElementById('loginScreen').style.display = 'none';
                  document.getElementById('mainApp').style.display = 'flex';
                  renderDashboard(foundUser);
              } else {
                  throw new Error("Şifre hatalı.");
              }
          })
          .catch((error) => {
              console.error(error);
              btn.innerText = "Sisteme Giriş Yap";
              btn.disabled = false;
              err.style.display = 'block';
              err.innerText = "Bilgiler hatalı. Lütfen kontrol edin.";
          });
    }

    function fetchDataByDocId(docId) {
        db.collection("clients").doc(docId).get().then((doc) => {
            if (doc.exists) {
                renderDashboard(doc.data());
            } else {
                doLogout();
            }
        });
    }

    function renderDashboard(data) {
        document.getElementById('welcomeTxt').innerText = `Hoş Geldin, ${data.name || 'Misafir'} 👋`;
        
        const total = data.total || 0;
        const paid = data.paid || 0;   
        const debt = total - paid;

        document.getElementById('totalPrice').innerText = `₺${total.toLocaleString('tr-TR')}`;
        document.getElementById('paidPrice').innerText = `₺${paid.toLocaleString('tr-TR')}`;
        document.getElementById('debtPrice').innerText = `₺${debt.toLocaleString('tr-TR')}`;

        // İş Akışı
        const stage = data.stage || 1; 
        document.getElementById('progressFill').style.width = (stage * 20) + "%";
        
        for(let i=1; i<=5; i++) {
            const stepEl = document.getElementById('s' + i);
            if(i <= stage) stepEl.classList.add('active');
            else stepEl.classList.remove('active');
        }

        const msgs = ["", "Hazırlık yapılıyor.", "Yedeklendi.", "Düzenleniyor.", "Baskıda.", "Teslim Edildi."];
        document.getElementById('statusMsg').innerText = msgs[stage] || "Veri bekleniyor...";

        // Tablo Detayları (Mobile Uyumlu data-label eklendi)
        const ses = data.session || {};
        const displayDate = ses.date ? ses.date + (ses.time ? ' ' + ses.time : '') : '-';

        document.getElementById('sessionRow').innerHTML = `
            <tr>
                <td data-label="Tarih / Saat"><strong>${displayDate}</strong></td>
                <td data-label="Paket">${ses.pkg || '-'}</td>
                <td data-label="Konum">${ses.loc || '-'}</td>
                <td data-label="Durum"><span class="badge b-wait">${ses.status || 'Planlanıyor'}</span></td>
            </tr>
        `;
    }

    function doLogout() {
        localStorage.removeItem('pasovart_client_id');
        location.reload();
    }
</script>
</body>
</html>
